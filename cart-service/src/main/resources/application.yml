server:
  port: 8084

spring:
  application:
    name: cart-service

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # DO NOT add spring.jackson.serialization here.
  # Jackson 3.x (used by Spring Boot 4.x) removed WRITE_DATES_AS_TIMESTAMPS
  # from SerializationFeature. Date format is configured in RedisConfig instead.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: full

cart:
  ttl-seconds: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.cart_service: DEBUG