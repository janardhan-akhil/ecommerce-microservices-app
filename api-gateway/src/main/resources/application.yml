server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

jwt:
  secret: "5A7234753778214125442A472D4B6150645367566B59703373367639792442264D"
  expiration-ms: 86400000

gateway:
  rate-limit-per-minute: 60

  public-paths:
    - /api/v1/users/login
    - /api/v1/users/register
    - /api/v1/products
    - /api/v1/products/


  routes:
    - path: /api/v1/users
      url: http://localhost:8081
    - path: /api/v1/products
      url: http://localhost:8082
    - path: /api/v1/orders
      url: http://localhost:8083
    - path: /api/v1/cart
      url: http://localhost:8084
    - path: /api/v1/payments
      url: http://localhost:8085

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    com.api_gateway: INFO