server:
  port: 8086

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/e-commerce_db
    username: root
    password: akhil
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false



  # ── Kafka Consumer ─────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest          # read from beginning on first start
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ecommerce.*"
        spring.json.use.type.headers: false  # use type mapping instead of class headers
    listener:
      ack-mode: MANUAL_IMMEDIATE            # commit offset only after successful email send
      missing-topics-fatal: false           # start up even if topics don't exist yet

  # ── Gmail SMTP ─────────────────────────────────────────────────
  # Setup: Google Account → Security → 2FA → App Passwords → generate one
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password-here
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── Notification settings ──────────────────────────────────────────
notification:
  from-email: your-email@gmail.com
  from-name: "E-Commerce Store"

# ── Kafka topic names ──────────────────────────────────────────────
kafka:
  topics:
    order-events: order-events
    payment-events: payment-events
    user-events: user-events

# ── Eureka ────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ecommerce.notificationservice: DEBUG
    org.springframework.kafka: INFO